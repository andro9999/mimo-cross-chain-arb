# MiMo Cross-Chain Arbitrage Engine Configuration

llm:
  base_url: "http://43.153.206.68:20128/v1"
  model: "xmtp/mimo-v2.5-pro"
  api_key: "${LLM_API_KEY}"
  max_retries: 3
  timeout: 120

chains:
  supported:
    - ethereum
    - arbitrum
    - polygon
    - base
    - optimism
    - bsc
    - avalanche

tokens:
  stablecoins: [USDC, USDT, DAI]
  majors: [WETH, WBTC]
  defi: [ARB, OP, LINK, UNI]

arbitrage:
  min_profit_bps: 30
  max_trade_size_usd: 100000
  default_trade_size_usd: 10000
  max_slippage_bps: 50
  bridge_timeout_seconds: 600

risk:
  max_risk_score: 70
  min_liquidity_usd: 1000000
  mev_protection: true

server:
  host: "0.0.0.0"
  port: 8080
